# ─────────────────────────────────────────────────────────────────────────────
# CarbonMirror — Cloud Build Configuration
# Builds, pushes to Artifact Registry, and deploys to Cloud Run
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION:       'europe-west1'
  _SERVICE_NAME: 'carbon-mirror'
  _REPOSITORY:   'carbon-mirror'
  _IMAGE_NAME:   '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

steps:
  # ── 1. Pull cache for faster builds ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id:   'pull-cache'
    entrypoint: bash
    args:
      - '-c'
      - |
        docker pull ${_IMAGE_NAME}:latest || true

  # ── 2. Build Docker image ──────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id:   'build'
    args:
      - 'build'
      - '--cache-from'
      - '${_IMAGE_NAME}:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=$$NEXT_PUBLIC_FIREBASE_API_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=$$NEXT_PUBLIC_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=$$NEXT_PUBLIC_FIREBASE_APP_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=https://${_SERVICE_NAME}-dot-${PROJECT_ID}.${_REGION}.run.app'
      - '--tag'
      - '${_IMAGE_NAME}:latest'
      - '--tag'
      - '${_IMAGE_NAME}:$SHORT_SHA'
      - '.'
    secretEnv:
      - 'NEXT_PUBLIC_FIREBASE_API_KEY'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID'

  # ── 3. Push to Artifact Registry ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id:   'push'
    args:
      - 'push'
      - '--all-tags'
      - '${_IMAGE_NAME}'

  # ── 4. Deploy to Cloud Run ─────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id:   'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_IMAGE_NAME}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1'
      - '--set-secrets'
      - 'GEMINI_API_KEY=gemini-api-key:latest'

# ── Secret Manager references ─────────────────────────────────────────────────
availableSecrets:
  secretManager:
    - versionName: 'projects/${PROJECT_ID}/secrets/firebase-api-key/versions/latest'
      env:         'NEXT_PUBLIC_FIREBASE_API_KEY'
    - versionName: 'projects/${PROJECT_ID}/secrets/firebase-auth-domain/versions/latest'
      env:         'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'
    - versionName: 'projects/${PROJECT_ID}/secrets/firebase-project-id/versions/latest'
      env:         'NEXT_PUBLIC_FIREBASE_PROJECT_ID'
    - versionName: 'projects/${PROJECT_ID}/secrets/firebase-storage-bucket/versions/latest'
      env:         'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET'
    - versionName: 'projects/${PROJECT_ID}/secrets/firebase-messaging-sender-id/versions/latest'
      env:         'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'
    - versionName: 'projects/${PROJECT_ID}/secrets/firebase-app-id/versions/latest'
      env:         'NEXT_PUBLIC_FIREBASE_APP_ID'

images:
  - '${_IMAGE_NAME}:latest'
  - '${_IMAGE_NAME}:$SHORT_SHA'

timeout: '1200s'
